{% extends "accounts/base.html" %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="login-container d-flex justify-content-center">
    <div class="login-box shadow text-center p-4">
        <h2 class="mb-4">Login</h2>

        {% if messages %}
            {% for message in messages %}
                <p class="text-danger">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label for="username" class="form-label">Utente</label>
                <input type="text" name="username" class="form-control rounded-pill" placeholder="Inserisci il nome utente">
            </div>
            <div class="mb-3 text-start">
                <label for="password" class="form-label">Password</label>
                <div class="d-flex align-items-center">
                    <input type="password" name="password" id="passwordField" class="form-control rounded-pill">
                    <button type="button" class="btn btn-outline-secondary rounded-pill ms-3" onclick="togglePassword()">Mostra</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mb-2">Entra</button>

            <a href="{% url 'registrazione' %}" class="btn btn-success w-100 rounded-pill py-2">Registrati</a>
        </form>
    </div>
</div>

<style>
    .login-container {
        /* Ridotta l'altezza minima e aumentato il margine superiore per posizionarlo in alto con precisione */
        min-height: 40vh; 
        margin-top: 50px; 
    }

    .login-box {
        width: 100%;
        max-width: 400px;
        background: white;
        border-radius: 20px;
        /* L'animazione parte da un po' più in alto per coerenza */
        animation: slideInDown 0.8s ease-out;
    }

    @keyframes slideInDown {
        from {
            transform: translateY(-30px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
</style>

<script>
    function togglePassword() {
        const field = document.getElementById("passwordField");
        field.type = field.type === "password" ? "text" : "password";
    }
</script>
{% endblock %}
