{% extends "accounts/base.html" %}
{% load static %}

{% block title %}Home AATO{% endblock %}

{% block content %}
<div class="main-box">
    <div class="welcome-header">
        <div class="logo-container">
            <img src="{% static 'aato_logo.png' %}" alt="Logo AATO" class="welcome-logo">
        </div>
        <h2>Benvenuto, <strong>{{ user.username }}</strong></h2>
    </div>
    <hr class="separator">
    <div class="button-grid">
        <a href="{% url 'ricerca_interventi' %}" class="btn btn-primary big-button shadow-sm">
            <i class="fas fa-search"></i> <span>Ricerca interventi</span>
        </a>
        <a href="{% url 'lista_manufatti' %}" class="btn btn-success big-button shadow-sm">
            <i class="fas fa-list-ul"></i> <span>Lista manufatti</span>
        </a>
        <a href="{% url 'lista_documenti' %}" class="btn btn-info big-button text-dark shadow-sm">
            <i class="fas fa-folder-open"></i> <span>Elenco documenti</span>
        </a>
        <a href="{% url 'visualizza_mappa' %}" class="btn btn-warning big-button text-dark shadow-sm">
            <i class="fas fa-map-marked-alt"></i> <span>Visualizza mappa</span>
        </a>
    </div>
    <div class="footer-section">
        <a href="{% url 'logout' %}" class="btn btn-outline-danger logout-btn">
            <i class="fas fa-sign-out-alt"></i> Esci
        </a>
    </div>
</div>

<style>
    .main-box {
        max-width: 480px;
        margin: -50px auto 40px auto; /* CORRETTO: non copre più i loghi */
        padding: 35px 25px;
        background: #ffffff;
        border-radius: 40px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        position: relative;
        z-index: 100;
    }
    .logo-container { width: 100%; display: flex; justify-content: center; margin-bottom: 15px; }
    .welcome-logo { max-width: 240px; max-height: 80px; object-fit: contain; }
    .welcome-header h2 { font-size: 1.5rem; color: #2c3e50; font-weight: 700; }
    .separator { margin: 20px 0; border-top: 1px solid rgba(0,0,0,0.06); }
    .big-button { display: flex; align-items: center; padding: 14px 22px; margin-bottom: 12px; border-radius: 50px; font-weight: 600; text-decoration: none; transition: 0.3s; }
    .big-button i { margin-right: 15px; width: 25px; }
    .logout-btn { margin-top: 15px; border-radius: 50px; padding: 8px 35px; }
    @media (max-width: 576px) { .main-box { margin: 10px 15px 30px 15px; } }
</style>
{% endblock %}
