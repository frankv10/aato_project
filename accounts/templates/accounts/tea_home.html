{% extends "accounts/base.html" %}
{% load static %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="main-box">
    <h2>Benvenuto {{ user.username }}</h2>

    <a href="{% url 'crea_manufatto' %}?from=ato" class="btn btn-primary big-button">Nuovo manufatto</a>
    <a href="{% url 'lista_manufatti' %}?from=ato" class="btn btn-success big-button">Lista manufatti</a>
    <a href="{% url 'lista_documenti' %}" class="btn btn-info big-button text-dark">Elenco documenti</a>
    <a href="{% url 'visualizza_mappa' %}" class="btn btn-warning big-button text-dark">Visualizza mappa</a>

    <a href="{% url 'logout' %}" class="btn btn-danger rounded-pill">Esci</a>
</div>

<style>
    .main-box {
        max-width: 500px;
        margin: 40px auto;
        padding: 30px;
        background: white;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        animation: slideInDown 0.8s ease-out;
    }

    .main-box h2 {
        font-size: 2em;
        margin-bottom: 30px;
    }

    .big-button {
        font-size: 1.2rem;
        padding: 14px;
        border-radius: 25px;
        margin-bottom: 15px;
        width: 100%;
    }

    @keyframes slideInDown {
        from {
            transform: translateY(-50px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
</style>
{% endblock %}
