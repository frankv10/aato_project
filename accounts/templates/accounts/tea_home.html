{% extends "accounts/base.html" %}
{% load static %}

{% block title %}Home TEA{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<div class="main-box">
    <div class="welcome-header">
        <div class="logo-container">
            <img src="{% static 'LogoAqA.jpeg' %}" alt="Logo Gruppo TEA" class="welcome-logo">
        </div>
        <h2>Benvenuto, <strong>{{ user.username }}</strong></h2>
    </div>

    <hr class="separator">

    <div class="button-grid">
        <a href="{% url 'crea_manufatto' %}" class="btn btn-primary big-button shadow-sm">
            <i class="fas fa-plus-circle"></i> <span>Nuovo manufatto</span>
        </a>
        
        <a href="{% url 'lista_manufatti' %}" class="btn btn-success big-button shadow-sm">
            <i class="fas fa-list-ul"></i> <span>Lista manufatti</span>
        </a>
        
        <a href="{% url 'lista_documenti' %}" class="btn btn-info big-button text-dark shadow-sm">
            <i class="fas fa-folder-open"></i> <span>Elenco documenti</span>
        </a>
        
        <a href="{% url 'visualizza_mappa' %}" class="btn btn-warning big-button text-dark shadow-sm">
            <i class="fas fa-map-marked-alt"></i> <span>Visualizza mappa</span>
        </a>
    </div>

    <div class="footer-section">
        <a href="{% url 'logout' %}" class="btn btn-outline-danger logout-btn">
            <i class="fas fa-sign-out-alt"></i> Esci
        </a>
    </div>
</div>

<style>
    .main-box {
        max-width: 480px;
        /* --- POSIZIONAMENTO ALTO: Identico ad AATO --- */
        margin: -160px auto 40px auto; 
        /* -------------------------------------------- */
        padding: 35px 25px;
        background: #ffffff;
        border-radius: 40px; /* Look ultra-tondeggiante */
        text-align: center;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        animation: slideInDown 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        z-index: 100;
    }

    .logo-container {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 15px;
        min-height: 70px;
    }

    .welcome-logo {
        max-width: 240px; 
        max-height: 80px;
        width: auto;
        height: auto;
        object-fit: contain; /* Non taglia il logo Gruppo TEA */
    }

    .welcome-header h2 {
        font-size: 1.5rem;
        color: #2c3e50;
        font-weight: 700;
        margin-top: 5px;
    }

    .separator {
        margin: 20px 0;
        border: 0;
        border-top: 1px solid rgba(0,0,0,0.06);
    }

    /* Pulsanti a Pillola */
    .big-button {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 14px 22px;
        margin-bottom: 12px;
        border-radius: 50px; 
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s ease;
        border: none;
        text-decoration: none;
    }

    .big-button i {
        font-size: 1.1rem;
        margin-right: 15px;
        width: 25px;
        text-align: center;
    }

    .big-button span {
        flex-grow: 1;
        text-align: left;
    }

    .big-button:hover {
        transform: scale(1.04) translateY(-3px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.15) !important;
        filter: brightness(1.05);
    }

    .logout-btn {
        margin-top: 15px;
        border-radius: 50px;
        padding: 8px 35px;
        font-weight: 600;
        font-size: 0.9rem;
    }

    @keyframes slideInDown {
        from { transform: translateY(-60px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    /* Adattamento per schermi piccoli */
    @media (max-width: 576px) {
        .main-box {
            margin: -100px 15px 30px 15px;
            padding: 25px 15px;
        }
    }
</style>
{% endblock %}
