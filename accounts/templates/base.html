{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema Sfiori{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .header {
            background-color: #c40000;
            color: white;
            padding: 10px 0;
            text-align: center;
            font-weight: bold;
            position: relative;
        }

        .logo-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
        }

        .logo-top img {
            height: 120px;
        }

        .btn-back {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            border: none;
            font-size: 1.5rem;
            padding: 5px 12px;
            border-radius: 50%;
            text-decoration: none;
            color: #c40000;
            font-weight: bold;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideInDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="{% url 'login' %}" class="btn-back">&#8592;</a>
        Sistema provinciale di monitoraggio sfiori<br>Provincia di Mantova
    </div>

    <div class="logo-top">
        <img src="{% static 'provincia_mantova.png' %}" alt="Logo Provincia">
        <img src="{% static 'mappa.jpg' %}" alt="Mappa Mantova" width="150">
    </div>

    {% block content %}{% endblock %}
</body>
</html>
