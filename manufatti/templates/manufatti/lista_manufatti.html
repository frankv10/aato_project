{% extends "accounts/base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary">LISTA MANUFATTI</h2>
    <a href="{% url 'crea_manufatto' %}" class="btn btn-success">➕ Crea nuovo</a>
  </div>

  {% if manufatti %}
  <div class="list-group shadow-sm mb-4">
    {% for m in manufatti %}
    <a href="{% url 'dettaglio_manufatto' m.id %}" class="list-group-item list-group-item-action">
      <div class="d-flex justify-content-between">
        <strong>{{ m.nome }}</strong>
        <span class="badge bg-secondary">{{ m.stato }}</span>
      </div>
    </a>
    {% endfor %}
  </div>
  {% else %}
  <div class="alert alert-info">Nessun manufatto presente.</div>
  {% endif %}

  <a href="{% url 'tea' %}" class="btn btn-outline-primary rounded-pill">⬅ Torna alla home</a>
</div>
{% endblock %}
