{% extends "accounts/base.html" %}

{% block content %}
<div class="container mt-2"> 
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"><i class="fas fa-file-upload me-2"></i>Carica Aggiornamenti Excel</h4>
        </div>
        <div class="card-body">
            <p class="alert alert-warning py-2 small">
                <strong>Istruzioni:</strong><br>
                1. Scarica l'Excel dalla lista.<br>
                2. Modifica i dati (non modificare la colonna <strong>NOME</strong>).<br>
                3. Carica il file qui per aggiornare il database.
            </p>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="myfile" class="form-label fw-bold">Seleziona file Excel (.xlsx)</label>
                    <input class="form-control" type="file" id="myfile" name="myfile" accept=".xlsx, .xls" required>
                </div>
                
                <div class="text-center">
                    <button type="submit" class="btn btn-success rounded-pill px-5 shadow-sm">
                        <i class="fas fa-check me-2"></i>Carica e Aggiorna
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="mt-4 text-center border-top pt-3">
        <a href="{% url 'lista_manufatti' %}" class="btn btn-outline-primary rounded-pill px-4">
            <i class="fas fa-arrow-left me-2"></i>Torna alla lista manufatti
        </a>
    </div>
</div>
{% endblock %}
