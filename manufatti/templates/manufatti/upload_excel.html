{% extends 'accounts/base.html' %}  {% block content %}
<div class="container mt-4">
    <h2>Importa Manufatti da Excel</h2>
    
    <div class="alert alert-info shadow-sm">
        <strong><i class="fas fa-info-circle"></i> Attenzione:</strong> Il file Excel deve contenere le colonne come <code>Codice</code> (per il nome), <code>Comune</code>, ecc.
        I dati esistenti verranno sovrascritti completamente (reset del database).
    </div>

    <form method="post" enctype="multipart/form-data" class="card p-4 shadow-sm mt-3">
        {% csrf_token %}
        <div class="mb-3">
            <label for="myfile" class="form-label fw-bold">Seleziona file Excel (.xlsx, .xls)</label>
            <input type="file" class="form-control" name="myfile" required accept=".xlsx, .xls">
        </div>
        
        <div class="d-flex justify-content-between align-items-center mt-4">
            <a href="{% url 'lista_manufatti' %}" class="btn btn-secondary rounded-pill px-4">Annulla</a>
            <button type="submit" class="btn btn-primary rounded-pill px-4">
                <i class="fas fa-upload me-2"></i>Carica e Importa
            </button>
        </div>
    </form>
</div>
{% endblock %}
