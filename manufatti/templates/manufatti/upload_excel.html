{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Importa Manufatti da Excel</h2>
    
    <div class="alert alert-info">
        <strong>Attenzione:</strong> Il file Excel deve contenere una colonna <code>NOME</code>.
        I dati esistenti verranno aggiornati, quelli nuovi verranno creati.
    </div>

    <form method="post" enctype="multipart/form-data" class="mt-3">
        {% csrf_token %}
        <div class="mb-3">
            <label for="myfile" class="form-label">Seleziona file Excel (.xlsx, .xls)</label>
            <input type="file" class="form-control" name="myfile" required>
        </div>
        <button type="submit" class="btn btn-primary">Carica e Importa</button>
        <a href="{% url 'lista_manufatti' %}" class="btn btn-secondary">Annulla</a>
    </form>
</div>
{% endblock %}
