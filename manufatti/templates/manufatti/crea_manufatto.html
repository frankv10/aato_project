{% extends "accounts/base.html" %}
{% load static %}

{% block title %}Nuovo Manufatto{% endblock %}

{% block content %}
<div class="main-box" style="
    max-width: 500px;
    margin: 40px auto;
    padding: 30px;
    background: white;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    animation: slideInDown 0.8s ease-out;
">
    <h2 style="font-size: 2em; margin-bottom: 30px;">Creazione manufatto</h2>

    <form method="post">
        {% csrf_token %}

        <!-- Campi Manufatto -->
        <h4 class="text-start mb-2">Manufatto</h4>
        {{ form_manufatto.as_p }}

        <!-- Bottone INFO IDRICHE -->
        <button type="button" class="btn btn-outline-secondary w-100 mb-3 py-3"
                onclick="toggleSection('info-idriche')">INFO IDRAULICHE</button>

        <!-- Sezione IDRICHE -->
        <div id="info-idriche" style="display: none;" class="text-start mb-3">
            {{ form_idriche.as_p }}
        </div>

        <!-- Bottone INFO GEOGRAFICHE -->
        <button type="button" class="btn btn-outline-secondary w-100 mb-3 py-3"
                onclick="toggleSection('info-geografiche')">INFO GEOGRAFICHE</button>

        <!-- Sezione GEO -->
        <div id="info-geografiche" style="display: none;" class="text-start mb-3">
            {{ form_geografiche.as_p }}
        </div>

        <!-- Salva -->
        <button type="submit" class="btn btn-primary w-100 mt-4">SALVA</button>
    </form>

    <!-- Torna alla lista -->
    <a href="{% url 'lista_manufatti' %}" class="btn btn-outline-primary w-100 mt-3">⬅ Torna alla lista</a>
</div>

<!-- Script per toggle -->
<script>
function toggleSection(id) {
    const section = document.getElementById(id);
    section.style.display = section.style.display === "none" ? "block" : "none";
}
</script>
{% endblock %}
